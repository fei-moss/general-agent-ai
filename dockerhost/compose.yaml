services:
  api:
    build:
      context: ..
      dockerfile: dockerhost/Dockerfile
    environment:
      APP_PORT: "8080"
      LOG_LEVEL: INFO
      DB_URL: postgresql+asyncpg://postgres:postgres@db:5432/agent
      REDIS_URL: redis://cache:6379/0
      CELERY_BROKER_URL: redis://cache:6379/1
      CELERY_RESULT_BACKEND: redis://cache:6379/2
      LLM_PROVIDER: mock
      RAG_ENABLED: "true"
      RAG_VECTOR_STORE: pgvector
      EMBEDDING_PROVIDER: gemini
      EMBEDDING_MODEL: gemini-embedding-2
      EMBEDDING_DIM: "256"
      PROVIDER_SECRET_STRICT: "true"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  worker:
    build:
      context: ..
      dockerfile: dockerhost/Dockerfile
    command:
      [
        "python",
        "-m",
        "celery",
        "-A",
        "app.tasks.celery_app:celery_app",
        "worker",
        "-l",
        "info",
        "-Q",
        "q.run,q.intent,q.rag,q.tool,q.llm,q.compose",
      ]
    environment:
      LOG_LEVEL: INFO
      DB_URL: postgresql+asyncpg://postgres:postgres@db:5432/agent
      REDIS_URL: redis://cache:6379/0
      CELERY_BROKER_URL: redis://cache:6379/1
      CELERY_RESULT_BACKEND: redis://cache:6379/2
      LLM_PROVIDER: mock
      RAG_ENABLED: "true"
      RAG_VECTOR_STORE: pgvector
      EMBEDDING_PROVIDER: gemini
      EMBEDDING_MODEL: gemini-embedding-2
      EMBEDDING_DIM: "256"
      PROVIDER_SECRET_STRICT: "true"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -m celery -A app.tasks.celery_app:celery_app inspect ping --timeout=5 >/tmp/celery-ping.log 2>&1 || exit 1",
        ]
      interval: 20s
      timeout: 8s
      retries: 6
      start_period: 30s

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../app/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  cache:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  postgres-data:
